<!-- @dsCard group="Components" viewport="700x360" name="Primitives — Buttons · Toggle · Slider · Progress · Badge" subtitle="Bronze/glass/ghost controls + status badges" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body{margin:0;padding:22px;background:
    radial-gradient(120% 120% at 90% 100%, #34372f 0%, #232520 60%, #1b1c18 100%);
    font-family:var(--font-sans);color:var(--text-on-glass);}
  .wrap{display:flex;flex-direction:column;gap:18px;}
  .grp{display:flex;flex-direction:column;gap:8px;}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted-glass);}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .panelish{background:rgba(31,33,31,.55);border:1px solid var(--glass-row-border);
    border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:12px;max-width:300px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, RoundButton, Toggle, Slider, ProgressBar, Badge } = window.CornerFishingDesignSystem_301be0;
function Demo(){
  const [mute,setMute] = React.useState(true);
  const [vol,setVol] = React.useState(72);
  return (
    <div className="wrap">
      <div className="grp">
        <span className="lbl">Buttons — variant × size · state</span>
        <div className="row">
          <Button variant="primary" icon="../../assets/ui/icon_coin.png">交付</Button>
          <Button variant="primary">卖 504</Button>
          <Button variant="secondary">全部卖出</Button>
          <Button variant="ghost" size="sm">锁</Button>
          <Button variant="primary" disabled>已完成</Button>
          <Button variant="primary" size="sm">扩容</Button>
          <Button variant="primary" size="lg">开始钓鱼</Button>
        </div>
      </div>
      <div className="row" style={{alignItems:'flex-start',gap:24}}>
        <div className="grp">
          <span className="lbl">Round widget buttons</span>
          <div className="row">
            <RoundButton icon="../../assets/ui/ui_button_rod.png" title="装备" />
            <RoundButton icon="../../assets/ui/ui_button_fish.png" title="鱼篓" badge={6} />
            <RoundButton icon="../../assets/ui/ui_button_coin.png" title="商店" />
          </div>
        </div>
        <div className="grp">
          <span className="lbl">Badges — tier / variant / status</span>
          <div className="row">
            <Badge tone="tier-0">普通</Badge>
            <Badge tone="tier-1">优良</Badge>
            <Badge tone="tier-2">稀有</Badge>
            <Badge tone="tier-3">史诗</Badge>
            <Badge tone="tier-4">传说</Badge>
            <Badge tone="tier-5">神话</Badge>
          </div>
          <div className="row">
            <Badge tone="variant-2">◆鎏金</Badge>
            <Badge tone="positive">✦集齐</Badge>
            <Badge tone="merchant" variant="pill">收鱼郎 ×1.5</Badge>
          </div>
        </div>
      </div>
      <div className="panelish">
        <span className="lbl">Settings controls</span>
        <Toggle label="静音" checked={mute} onChange={setMute} />
        <Slider label="主音量" value={vol} onChange={setVol} />
        <ProgressBar value={80} max={160} caption={<><span>80 / 160</span><span>奖励 4500 金币</span></>} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
