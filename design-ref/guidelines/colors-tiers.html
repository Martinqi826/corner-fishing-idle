<!-- @dsCard group="Colors" viewport="700x150" name="Rarity Tiers" subtitle="普通→神话 · the core grade signal, used to colour fish names" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;padding:18px;background:#23241e;font-family:var(--font-sans);}
 .row{display:flex;gap:10px;}
 .sw{flex:1;display:flex;flex-direction:column;gap:6px;}
 .chip{height:46px;border-radius:10px;border:1px solid rgba(255,255,255,.12);}
 .cn{font-size:14px;font-weight:700;}
 .en{font-size:11px;color:var(--text-muted-glass);}
 .hex{font-size:11px;color:#8d897d;font-family:var(--font-mono);}
</style></head>
<body><div class="row">
 <div class="sw"><div class="chip" style="background:var(--tier-0)"></div><span class="cn" style="color:var(--tier-0)">普通</span><span class="en">Common</span><span class="hex">#C7C7CC</span></div>
 <div class="sw"><div class="chip" style="background:var(--tier-1)"></div><span class="cn" style="color:var(--tier-1)">优良</span><span class="en">Fine</span><span class="hex">#59C74D</span></div>
 <div class="sw"><div class="chip" style="background:var(--tier-2)"></div><span class="cn" style="color:var(--tier-2)">稀有</span><span class="en">Rare</span><span class="hex">#4D9EF2</span></div>
 <div class="sw"><div class="chip" style="background:var(--tier-3)"></div><span class="cn" style="color:var(--tier-3)">史诗</span><span class="en">Epic</span><span class="hex">#B86BF2</span></div>
 <div class="sw"><div class="chip" style="background:var(--tier-4)"></div><span class="cn" style="color:var(--tier-4)">传说</span><span class="en">Legend</span><span class="hex">#FF8C1F</span></div>
 <div class="sw"><div class="chip" style="background:var(--tier-5)"></div><span class="cn" style="color:var(--tier-5)">神话</span><span class="en">Mythic</span><span class="hex">#FF6152</span></div>
</div></body></html>
