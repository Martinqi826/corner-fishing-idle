<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;padding:20px;background:#23241e;font-family:var(--font-sans);color:#ece8e0;
   display:flex;align-items:flex-end;gap:16px;}
 .c{display:flex;flex-direction:column;align-items:center;gap:7px;}
 .bar{background:var(--bronze);border-radius:4px;width:22px;}
 .v{font-size:11px;color:#8d897d;font-family:var(--font-mono);}
</style></head>
<body>
 <div class="c"><div class="bar" style="height:4px"></div><span class="v">4</span></div>
 <div class="c"><div class="bar" style="height:6px"></div><span class="v">6</span></div>
 <div class="c"><div class="bar" style="height:8px"></div><span class="v">8</span></div>
 <div class="c"><div class="bar" style="height:10px"></div><span class="v">10</span></div>
 <div class="c"><div class="bar" style="height:12px"></div><span class="v">12</span></div>
 <div class="c"><div class="bar" style="height:16px"></div><span class="v">16</span></div>
 <div class="c"><div class="bar" style="height:18px"></div><span class="v">18</span></div>
 <div class="c"><div class="bar" style="height:24px"></div><span class="v">24</span></div>
 <div class="c"><div class="bar" style="height:32px"></div><span class="v">32</span></div>
 <div style="margin-left:14px;font-size:12px;color:#c7bda8;line-height:1.6;">
   panel padding <b style="color:#e8e0c7">18 / 16</b><br/>row gap <b style="color:#e8e0c7">10</b> · chip gap <b style="color:#e8e0c7">6</b>
 </div>
</body></html>
