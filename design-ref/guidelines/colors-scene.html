<!-- @dsCard group="Colors" viewport="700x170" name="Winter Scene Palette" subtitle="The painterly world — snow, mountain, pine, water, rock, coat" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;padding:18px;background:#23241e;font-family:var(--font-sans);}
 .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
 .sw{display:flex;flex-direction:column;gap:5px;}
 .chip{height:40px;border-radius:8px;border:1px solid rgba(255,255,255,.1);}
 .nm{font-size:11px;color:#d8d2c4;}
 .hex{font-size:10px;color:#8d897d;font-family:var(--font-mono);}
</style></head>
<body><div class="grid">
 <div class="sw"><div class="chip" style="background:var(--snow-haze)"></div><span class="nm">snow haze</span><span class="hex">#EEE8DC</span></div>
 <div class="sw"><div class="chip" style="background:var(--snow-2)"></div><span class="nm">snow fade</span><span class="hex">#D8D2C4</span></div>
 <div class="sw"><div class="chip" style="background:var(--snow-3)"></div><span class="nm">snow shadow</span><span class="hex">#C9C2B5</span></div>
 <div class="sw"><div class="chip" style="background:var(--mountain)"></div><span class="nm">mountain</span><span class="hex">#9AA8AE</span></div>
 <div class="sw"><div class="chip" style="background:var(--mountain-light)"></div><span class="nm">mtn light</span><span class="hex">#B7C1C5</span></div>
 <div class="sw"><div class="chip" style="background:var(--water-light)"></div><span class="nm">water light</span><span class="hex">#A7B8B7</span></div>
 <div class="sw"><div class="chip" style="background:var(--water-mid)"></div><span class="nm">water mid</span><span class="hex">#6E9298</span></div>
 <div class="sw"><div class="chip" style="background:var(--water)"></div><span class="nm">water</span><span class="hex">#476F78</span></div>
 <div class="sw"><div class="chip" style="background:var(--pine-light)"></div><span class="nm">pine light</span><span class="hex">#58675E</span></div>
 <div class="sw"><div class="chip" style="background:var(--pine)"></div><span class="nm">pine</span><span class="hex">#3F4D45</span></div>
 <div class="sw"><div class="chip" style="background:var(--rock-light)"></div><span class="nm">rock light</span><span class="hex">#969486</span></div>
 <div class="sw"><div class="chip" style="background:var(--coat-olive)"></div><span class="nm">coat olive</span><span class="hex">#5F6652</span></div>
</div></body></html>
