<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;padding:0;background:#d8d2c4;display:grid;grid-template-columns:repeat(3,1fr);}
 .s{position:relative;height:300px;overflow:hidden;}
 .s img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:right bottom;}
 .cap{position:absolute;left:10px;bottom:8px;font-family:var(--font-display);font-weight:700;
   font-size:15px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.7);z-index:1;}
</style></head>
<body>
 <div class="s"><img src="../assets/scenes/spot_river_bend.png" alt="" /><span class="cap">新手河湾</span></div>
 <div class="s"><img src="../assets/scenes/spot_still_lake.png" alt="" /><span class="cap">静水湖泊</span></div>
 <div class="s"><img src="../assets/scenes/spot_coast_pier.png" alt="" /><span class="cap">海岸码头</span></div>
</body></html>
