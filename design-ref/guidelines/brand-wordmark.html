<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;height:230px;display:flex;align-items:center;justify-content:center;
   background:radial-gradient(120% 130% at 80% 100%,#3a3d33,#23241e 72%);font-family:var(--font-display);}
 .mark{display:flex;align-items:center;gap:18px;}
 .lant{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 0 18px rgba(240,201,120,.5));}

 .zh{font-size:46px;font-weight:900;color:#ebe0c7;letter-spacing:.02em;line-height:1;}
 .en{font-family:var(--font-sans);font-size:13px;font-weight:700;letter-spacing:.32em;

<body>
 <div class="mark">
   <img class="lant" src="../assets/props/lantern.png" alt="" />
   <div class="txt"><span class="zh">角落垂钓</span><span class="en">Corner Fishing</span></div>
 </div>
</body></html>
