<!-- @dsCard group="Spacing" viewport="700x160" name="Corner Radii" subtitle="16 panel · 12 card · 9 row · 8 button · pill" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;padding:20px;background:#23241e;font-family:var(--font-sans);color:#ece8e0;
   display:flex;gap:18px;align-items:flex-end;}
 .c{display:flex;flex-direction:column;align-items:center;gap:8px;}
 .box{width:74px;height:60px;background:rgba(168,125,64,.28);
   border:1px solid var(--gold);border-bottom:none;}
 .nm{font-size:12px;color:#e8e0c7;}
 .v{font-size:11px;color:#8d897d;font-family:var(--font-mono);}
</style></head>
<body>
 <div class="c"><div class="box" style="border-radius:16px 16px 0 0"></div><span class="nm">panel</span><span class="v">16px</span></div>
 <div class="c"><div class="box" style="border-radius:12px 12px 0 0"></div><span class="nm">card</span><span class="v">12px</span></div>
 <div class="c"><div class="box" style="border-radius:9px 9px 0 0"></div><span class="nm">row</span><span class="v">9px</span></div>
 <div class="c"><div class="box" style="border-radius:8px 8px 0 0"></div><span class="nm">button</span><span class="v">8px</span></div>
 <div class="c"><div class="box" style="border-radius:999px 999px 0 0"></div><span class="nm">pill / chip</span><span class="v">999px</span></div>
</body></html>
