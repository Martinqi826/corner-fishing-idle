<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;padding:18px;background:#23241e;font-family:var(--font-sans);color:#c7bda8;}
 .grid{display:grid;grid-template-columns:repeat(9,1fr);gap:10px;align-items:end;}
 .c{display:flex;flex-direction:column;align-items:center;gap:5px;}
 .c img{height:48px;width:48px;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4));}
 .n{font-size:10px;}
</style></head>
<body>
 <div class="grid">
  <div class="c"><img src="../assets/equipment/rod_wood.png"/><span class="n">木竿</span></div>
  <div class="c"><img src="../assets/equipment/rod_carbon.png"/><span class="n">碳素竿</span></div>
  <div class="c"><img src="../assets/equipment/hook_basic.png"/><span class="n">鱼钩</span></div>
  <div class="c"><img src="../assets/equipment/bait_jar.png"/><span class="n">鱼饵</span></div>
  <div class="c"><img src="../assets/equipment/tackle_box.png"/><span class="n">钓具箱</span></div>
  <div class="c"><img src="../assets/equipment/fish_basket.png"/><span class="n">鱼篓</span></div>
  <div class="c"><img src="../assets/equipment/coin_pouch.png"/><span class="n">钱袋</span></div>
  <div class="c"><img src="../assets/props/lantern.png"/><span class="n">灯笼</span></div>
  <div class="c"><img src="../assets/props/bobber_idle.png"/><span class="n">浮标</span></div>
 </div>
 <div class="grid" style="grid-template-columns:repeat(9,1fr);margin-top:14px;">
  <div class="c"><img src="../assets/ui/ui_button_rod.png"/><span class="n">装备钮</span></div>
  <div class="c"><img src="../assets/ui/ui_button_fish.png"/><span class="n">鱼篓钮</span></div>
  <div class="c"><img src="../assets/ui/ui_button_coin.png"/><span class="n">商店钮</span></div>
  <div class="c"><img src="../assets/ui/icon_coin.png"/><span class="n">金币</span></div>
  <div class="c"><img src="../assets/ui/icon_weight.png"/><span class="n">重量</span></div>
  <div class="c"><img src="../assets/ui/icon_capacity.png"/><span class="n">容量</span></div>
  <div class="c"><img src="../assets/ui/icon_sell.png"/><span class="n">卖出</span></div>
  <div class="c"><img src="../assets/ui/icon_dex.png"/><span class="n">图鉴</span></div>
  <div class="c"><img src="../assets/ui/event_fish_run.png"/><span class="n">鱼汛</span></div>
 </div>
</body></html>
