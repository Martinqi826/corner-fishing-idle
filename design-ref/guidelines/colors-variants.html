<!-- @dsCard group="Colors" viewport="700x150" name="Rare Variants" subtitle="斑斓 / 鎏金 / 七彩 — orthogonal to tier, ×2/×5/×12 value" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;padding:18px;background:#23241e;font-family:var(--font-sans);}
 .row{display:flex;gap:12px;}
 .sw{flex:1;display:flex;flex-direction:column;gap:6px;}
 .chip{height:46px;border-radius:10px;border:1px solid rgba(255,255,255,.12);box-shadow:0 0 14px -2px var(--g);}
 .cn{font-size:14px;font-weight:700;}
 .mult{font-size:11px;color:var(--text-muted-glass);}
 .hex{font-size:11px;color:#8d897d;font-family:var(--font-mono);}
</style></head>
<body><div class="row">
 <div class="sw"><div class="chip" style="background:var(--variant-1);--g:rgba(140,217,242,.6)"></div><span class="cn" style="color:var(--variant-1)">◆ 斑斓</span><span class="mult">Dappled · ×2</span><span class="hex">#8CD9F2</span></div>
 <div class="sw"><div class="chip" style="background:var(--variant-2);--g:rgba(255,214,89,.7)"></div><span class="cn" style="color:var(--variant-2)">◆ 鎏金</span><span class="mult">Gilded · ×5 · 发光</span><span class="hex">#FFD659</span></div>
 <div class="sw"><div class="chip" style="background:var(--variant-3);--g:rgba(242,140,242,.6)"></div><span class="cn" style="color:var(--variant-3)">◆ 七彩</span><span class="mult">Prismatic · ×12 · 发光</span><span class="hex">#F28CF2</span></div>
</div></body></html>
