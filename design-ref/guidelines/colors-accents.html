<!-- @dsCard group="Colors" viewport="700x150" name="Warm Accents" subtitle="The single lantern-warm accent family — gold, bronze, rust" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;padding:18px;background:#23241e;font-family:var(--font-sans);}
 .row{display:flex;gap:10px;}
 .sw{flex:1;display:flex;flex-direction:column;gap:6px;}
 .chip{height:46px;border-radius:10px;border:1px solid rgba(255,255,255,.12);}
 .nm{font-size:13px;font-weight:500;color:#e8e0c7;}
 .role{font-size:11px;color:var(--text-muted-glass);}
 .hex{font-size:11px;color:#8d897d;font-family:var(--font-mono);}
</style></head>
<body><div class="row">
 <div class="sw"><div class="chip" style="background:var(--gold-bright)"></div><span class="nm">gold bright</span><span class="role">lantern highlight</span><span class="hex">#F0C978</span></div>
 <div class="sw"><div class="chip" style="background:var(--gold)"></div><span class="nm">gold</span><span class="role">primary accent</span><span class="hex">#D6A85D</span></div>
 <div class="sw"><div class="chip" style="background:var(--bronze)"></div><span class="nm">bronze</span><span class="role">primary button face</span><span class="hex">#A87D40</span></div>
 <div class="sw"><div class="chip" style="background:var(--bronze-press)"></div><span class="nm">bronze press</span><span class="role">pressed state</span><span class="hex">#805C2E</span></div>
 <div class="sw"><div class="chip" style="background:var(--rust)"></div><span class="nm">rust</span><span class="role">rare red / warnings</span><span class="hex">#AD5F4D</span></div>
</div></body></html>
