<!doctype html>
<meta charset="utf-8">
<title>River Bend Day Cycle Preview</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #ece8dd;
    font-family: Arial, sans-serif;
    color: #2b2a26;
  }
  main {
    width: min(92vw, 900px);
  }
  .stage {
    position: relative;
    width: 520px;
    height: 400px;
    margin: 0 auto;
    background: #f8f6ef;
    overflow: hidden;
  }
  .stage img {
    position: absolute;
    inset: 0;
    width: 520px;
    height: 400px;
    object-fit: cover;
    opacity: 0;
    animation: cycle 24s infinite;
  }
  .stage img:nth-child(1) { animation-delay: 0s; }
  .stage img:nth-child(2) { animation-delay: 6s; }
  .stage img:nth-child(3) { animation-delay: 12s; }
  .stage img:nth-child(4) { animation-delay: 18s; }
  @keyframes cycle {
    0% { opacity: 0; }
    8% { opacity: 1; }
    25% { opacity: 1; }
    33% { opacity: 0; }
    100% { opacity: 0; }
  }
  .strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 18px;
  }
  .strip figure {
    margin: 0;
    background: rgba(255,255,255,0.45);
    padding: 8px;
  }
  .strip img {
    width: 100%;
    display: block;
  }
  figcaption {
    font-size: 12px;
    margin-top: 6px;
  }
</style>
<main>
  <div class="stage">
    <img src="spot_river_bend_dawn_key_v1.png" alt="dawn">
    <img src="spot_river_bend_day_reference_v1.png" alt="day">
    <img src="spot_river_bend_dusk_key_v1.png" alt="dusk">
    <img src="spot_river_bend_night_key_v1.png" alt="night">
  </div>
  <div class="strip">
    <figure><img src="spot_river_bend_dawn_key_v1.png" alt=""><figcaption>dawn key</figcaption></figure>
    <figure><img src="spot_river_bend_day_reference_v1.png" alt=""><figcaption>day reference</figcaption></figure>
    <figure><img src="spot_river_bend_dusk_key_v1.png" alt=""><figcaption>dusk key</figcaption></figure>
    <figure><img src="spot_river_bend_night_key_v1.png" alt=""><figcaption>night key</figcaption></figure>
  </div>
</main>
